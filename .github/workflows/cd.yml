name: cd

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # required for peaceiris/actions-gh-pages

jobs:
  cd:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate
        run: yarn run generate
        env:
          BASE_URL: /
          NODE_ENV: production
          G_API_KEY: ${{ secrets.G_API_KEY }}
          G_APP_ID: ${{ secrets.G_APP_ID }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: bgc.jasonsuttles.dev

      - name: Deploy database rules to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_3AE94 }}' > /tmp/sa.json
          npx firebase-tools@latest deploy --only database --project board-game-calendar-3ae94
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Deploy functions to Firebase
        # --force deletes deployed functions that are no longer in the source
        # (deletion can't prompt in CI). Needed so renaming a function — e.g.
        # onEmailInviteCreated → onEmailInviteAdded, which was required to
        # replace a function stuck with the wrong trigger type — cleans up the
        # orphan instead of failing the deploy.
        run: |
          npx firebase-tools@latest deploy --only functions --force --project board-game-calendar-3ae94
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
