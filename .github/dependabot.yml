version: 2
updates:
  # Fetch and update latest `npm` packages
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: daily
      time: '00:00'
    open-pull-requests-limit: 10
    reviewers:
      - djeisen642
    assignees:
      - djeisen642
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    ignore:
      # firebase-functions 7.x declares a peer dep of firebase-admin ^11/^12/^13;
      # bumping firebase-admin to 14 makes the GCF buildpack's strict
      # `npm install` fail with ERESOLVE and breaks every functions deploy.
      # Remove this once firebase-functions accepts firebase-admin 14.
      - dependency-name: firebase-admin
        update-types: ['version-update:semver-major']
  # Fetch and update latest `github-actions` pkgs
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: daily
      time: '00:00'
    open-pull-requests-limit: 10
    reviewers:
      - djeisen642
    assignees:
      - djeisen642
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
